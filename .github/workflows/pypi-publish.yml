name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: List files before build
      run: |
        ls -la
        ls -la mamba/ || echo "mamba folder not found"
    
    - name: Build package
      run: |
        python -m build --verbose
    
    - name: Check package contents
      run: |
        twine check dist/*
        unzip -l dist/*.whl || tar -tzf dist/*.tar.gz
    
    - name: Test import locally
      run: |
        pip install dist/*.whl
        python -c "from mamba import MambaClient; print('Import successful')"
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
        verbose: true
