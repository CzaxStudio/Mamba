name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build setuptools wheel
    
    - name: List files before build
      run: |
        echo "=== Current directory ==="
        ls -la
        echo "=== mamba directory ==="
        ls -la mamba/ || echo "ERROR: mamba directory not found"
        echo "=== Check __init__.py ==="
        cat mamba/__init__.py | head -5 || echo "ERROR: __init__.py missing"
    
    - name: Build package
      run: |
        python -m build --verbose
    
    - name: List build artifacts
      run: |
        ls -la dist/
    
    - name: Test import
      run: |
        pip install dist/*.whl
        python -c "from mamba import MambaClient; print('Import successful')"
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        verbose: true
